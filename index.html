<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>しまテト スマホ版</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}body{margin:0;min-height:100svh;display:flex;align-items:center;justify-content:center;font-family:system-ui,-apple-system,"Segoe UI","Hiragino Kaku Gothic ProN",Meiryo,sans-serif;color:#151515;background:radial-gradient(circle at 18% 12%,rgba(255,255,255,.78),transparent 22rem),radial-gradient(circle at 82% 18%,rgba(120,225,255,.48),transparent 26rem),linear-gradient(180deg,#78ecff 0%,#2fb4dc 38%,#0f6798 70%,#051c36 100%);overflow:hidden}.wrap{width:min(1120px,96vw);display:grid;grid-template-columns:1fr 360px;gap:22px;align-items:center}.game-card{position:relative;background:rgba(255,255,255,.70);border:4px solid #111;border-radius:26px;padding:18px;box-shadow:0 18px 0 rgba(0,0,0,.15)}.title{display:flex;align-items:center;gap:12px;margin:0 0 12px;font-size:42px;font-weight:900;letter-spacing:.06em;line-height:1}.badge{background:#111;color:#fff;border-radius:999px;padding:8px 14px;font-size:16px;transform:rotate(-3deg)}#board{display:block;width:100%;max-height:82vh;aspect-ratio:10/20;background:#0b5978;border:5px solid #111;border-radius:18px;box-shadow:inset 0 0 0 4px rgba(255,255,255,.36),0 0 24px rgba(0,68,104,.35);touch-action:none}.side{display:flex;flex-direction:column;gap:16px}.panel{background:rgba(255,255,255,.80);border:4px solid #111;border-radius:24px;padding:16px;box-shadow:0 10px 0 rgba(0,0,0,.12)}.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px}.stat{background:#d9f7ff;border:3px solid #111;border-radius:16px;padding:10px 12px}.stat span{display:block;font-size:12px;opacity:.65;font-weight:800}.stat b{font-size:24px}.minirow{display:flex;justify-content:space-between;gap:12px}.mini{width:148px;height:112px;background:#d9f7ff;border:3px solid #111;border-radius:16px}.controls{font-size:14px;line-height:1.75}kbd{font:800 12px/1 system-ui;background:#111;color:#fff;border-radius:7px;padding:4px 7px;display:inline-block;min-width:24px;text-align:center}.bonus-note{background:linear-gradient(135deg,#071928,#0b6389);color:#fff;border-radius:16px;padding:12px;font-weight:900;line-height:1.45;box-shadow:inset 0 0 0 2px #ffcc24}.credit{font-size:11px;opacity:.68;margin-top:8px}.message{position:absolute;inset:18px;display:none;place-items:center;background:rgba(230,251,255,.78);border-radius:20px;text-align:center;z-index:5}.message.show{display:grid}.message .box{background:#dff7ff;border:5px solid #111;border-radius:26px;padding:24px;box-shadow:0 12px 0 rgba(0,0,0,.16)}button{border:4px solid #111;background:#ffdf64;color:#111;border-radius:16px;padding:12px 16px;font-weight:900;cursor:pointer;box-shadow:0 6px 0 rgba(0,0,0,.22)}button:active{transform:translateY(3px);box-shadow:0 3px 0 rgba(0,0,0,.22)}.mobile-pad{display:none;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:10px}.touch-btn{height:54px;border:3px solid #111;border-radius:16px;background:#fff174;font-size:22px;font-weight:1000;box-shadow:0 5px 0 rgba(0,0,0,.25);user-select:none}.touch-btn:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(0,0,0,.25);filter:brightness(.95)}.fs-btn{width:100%;margin-top:10px;background:#7ee8ff}.sound-row{display:flex;gap:8px}.sound-row button{flex:1;font-size:13px;padding:9px 8px}#cutin{position:fixed;inset:0;display:none;place-items:center;z-index:20;pointer-events:none;background:radial-gradient(circle,rgba(255,236,109,.78),rgba(255,126,0,.34) 32%,rgba(0,0,0,.22) 72%,transparent)}#cutin.show{display:grid;animation:cutinBg 1.45s ease-out forwards}.cutin-card{display:flex;align-items:center;gap:18px;background:#fff7c4;border:7px solid #111;border-radius:30px;padding:18px 24px;box-shadow:0 18px 0 rgba(0,0,0,.26);animation:cutinPop 1.45s cubic-bezier(.2,1.5,.35,1) forwards}.cutin-face{width:150px;height:150px;border:5px solid #111;border-radius:50%;background:#fff;object-fit:cover;object-position:50% 20%}.cutin-title{font-size:38px;font-weight:1000}.cutin-score{font-size:27px;font-weight:1000;color:#d13b00;text-shadow:2px 2px #fff}@keyframes cutinPop{0%{transform:translateX(-120vw) rotate(-12deg) scale(.5)}25%{transform:translateX(0) rotate(-3deg) scale(1.18)}68%{transform:translateX(0) rotate(1deg) scale(1)}100%{transform:translateX(120vw) rotate(10deg) scale(.9)}}@keyframes cutinBg{0%{opacity:0}12%{opacity:1}86%{opacity:1}100%{opacity:0}}

function triggerSuperBonus(hits){bonusActive=true;paused=true;let cells=[];for(const h of hits)for(let yy=h.y;yy<h.y+h.h;yy++)for(let xx=h.x;xx<h.x+h.w;xx++)cells.push([xx,yy]);let bonus=10000*level*hits.length;score+=bonus;lines+=10;updateUI();showCutin(bonus);megaBurst(cells);shock=1;beep('boom');vibrate([80,40,120,40,200]);clearRowsFx=[];let start=Math.max(0,Math.min(ROWS-10, Math.min(...hits.map(h=>h.y))-3));for(let y=start;y<start+10;y++)clearRowsFx.push({y,life:70});setTimeout(()=>{for(let y=start;y<start+10;y++)for(let x=0;x<COLS;x++)board[y][x]=null;megaBurst(Array.from({length:10},(_,i)=>[5,start+i]));applyGravity();level=1+Math.floor(lines/10);dropMs=Math.max(105,850-(level-1)*62);bonusActive=false;paused=false;spawn();updateUI();},1250)}
function lock(){merge();if(checkBonus())return;clearLines();spawn();updateUI()}function softDrop(){if(!started||paused||over||bonusActive)return;if(!collide(piece,0,1)){piece.y++;score++}else lock();updateUI()}function hardDrop(){if(!started||paused||over||bonusActive)return;let d=0;while(!collide(piece,0,1)){piece.y++;d++}score+=d*2;beep('drop');vibrate(25);lock()}function move(dx){if(!started||paused||over||bonusActive)return;if(!collide(piece,dx,0)){piece.x+=dx;beep('bubble')}}function turn(dir){if(!started||paused||over||bonusActive)return;if(piece.isBonus&&piece.type==='I')return;let r=rotate(piece.shape,dir),kicks=[0,1,-1,2,-2];for(const k of kicks)if(!collide(piece,k,0,r)){piece.shape=r;piece.x+=k;beep('bubble');return}}function hold(){if(!started||paused||over||bonusActive||!canHold)return;if(!holdPiece){holdPiece={type:piece.type,shape:clone(piece.shape),isBonus:piece.isBonus,bonusPart:piece.bonusPart};spawn()}else{let old=holdPiece;holdPiece={type:piece.type,shape:clone(piece.shape),isBonus:piece.isBonus,bonusPart:piece.bonusPart};piece={type:old.type,shape:clone(old.shape),isBonus:old.isBonus,bonusPart:old.bonusPart,x:3,y:-1}}canHold=false;drawMini(holdCtx,holdPiece);beep('bubble')}function updateUI(){scoreEl.textContent=score;levelEl.textContent=level;linesEl.textContent=lines;if(score>best){best=score;localStorage.setItem('shimateto_best_mobile',best);bestEl.textContent=best}}
function stackDepth(){let top=ROWS;for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++)if(board[y][x])top=Math.min(top,y);return (ROWS-top)/ROWS}function drawSeaDecor(d,t){ctx.save();ctx.globalAlpha=.34-.16*d;ctx.strokeStyle='rgba(255,255,255,.45)';ctx.lineWidth=2;for(let i=0;i<5;i++){let x=25+i*58+Math.sin(t*.0007+i)*8;ctx.beginPath();ctx.moveTo(x,0);ctx.bezierCurveTo(x+20,120,x-25,245,x+10,380);ctx.stroke()}let bubbleCount=14+Math.floor(d*16);for(let i=0;i<bubbleCount;i++){let x=(i*47+Math.sin(t*.001+i)*18)%300,y=(600-((t*.035+i*73)%680)),r=2+(i%5)*.9+d*1.2;ctx.globalAlpha=.18+.18*(1-d);ctx.strokeStyle='rgba(235,252,255,.9)';ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.stroke()}let fishN=2+Math.floor(d*3);for(let i=0;i<fishN;i++){let dir=i%2?1:-1,x=(dir>0?((t*.025+i*101)%360)-45:345-((t*.022+i*91)%390)),y=70+i*80+Math.sin(t*.002+i)*18;ctx.globalAlpha=.55;ctx.fillStyle=d>.55?'rgba(5,28,45,.42)':'rgba(255,238,112,.55)';ctx.beginPath();ctx.ellipse(x,y,12,6,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.moveTo(x-dir*12,y);ctx.lineTo(x-dir*23,y-7);ctx.lineTo(x-dir*23,y+7);ctx.closePath();ctx.fill()}for(let i=0;i<6;i++){let baseX=18+i*52,h=45+18*((i%3)+1)+d*42;ctx.strokeStyle=i%2?'rgba(44,178,99,.62)':'rgba(25,139,88,.68)';ctx.lineWidth=5;ctx.lineCap='round';ctx.globalAlpha=.58+.22*d;ctx.beginPath();ctx.moveTo(baseX,600);for(let k=1;k<=5;k++)ctx.lineTo(baseX+Math.sin(t*.002+k+i)*8,600-h*k/5);ctx.stroke()}ctx.restore()}function drawGrid(){let d=stackDepth(),t=performance.now();let top=`rgb(${Math.round(86-55*d)},${Math.round(218-140*d)},${Math.round(245-138*d)})`,mid=`rgb(${Math.round(20-8*d)},${Math.round(126-70*d)},${Math.round(168-80*d)})`,bot=`rgb(${Math.round(5+5*d)},${Math.round(58-33*d)},${Math.round(94-46*d)})`;let g=ctx.createLinearGradient(0,0,0,600);g.addColorStop(0,top);g.addColorStop(.44,mid);g.addColorStop(1,bot);ctx.fillStyle=g;ctx.fillRect(0,0,300,600);ctx.fillStyle=`rgba(0,0,0,${.05+.34*d})`;ctx.fillRect(0,0,300,600);drawSeaDecor(d,t);ctx.strokeStyle=d>.65?'rgba(255,255,255,.16)':'rgba(255,255,255,.11)';for(let x=1;x<COLS;x++){ctx.beginPath();ctx.moveTo(x*CELL,0);ctx.lineTo(x*CELL,600);ctx.stroke()}for(let y=1;y<ROWS;y++){ctx.beginPath();ctx.moveTo(0,y*CELL);ctx.lineTo(300,y*CELL);ctx.stroke()}}
function rectPath(c,shape,x0,y0,cell){for(let y=0;y<shape.length;y++)for(let x=0;x<shape[y].length;x++)if(shape[y][x])c.rect(x0+x*cell,y0+y*cell,cell,cell)}function box(c,shape,x0,y0,cell,ghost=false,isBonus=false){c.save();c.fillStyle=ghost?'rgba(255,241,189,.45)':'#fff1bd';c.strokeStyle=isBonus?'#ffca18':(ghost?'rgba(0,0,0,.25)':'#111');c.lineWidth=isBonus?Math.max(3.2,cell*.12):2;c.shadowColor=isBonus?'#ffec5c':'transparent';c.shadowBlur=isBonus?12:0;for(let y=0;y<shape.length;y++)for(let x=0;x<shape[y].length;x++)if(shape[y][x]){c.fillRect(x0+x*cell,y0+y*cell,cell,cell);c.strokeRect(x0+x*cell+.7,y0+y*cell+.7,cell-1.4,cell-1.4)}c.restore()}function cover(c,img,sx,sy,sw,sh,dx,dy,dw,dh){let sc=Math.max(dw/sw,dh/sh),rw=sw*sc,rh=sh*sc;c.drawImage(img,sx,sy,sw,sh,dx+(dw-rw)/2,dy+(dh-rh)/2,rw,rh)}function drawNormal(c,shape,x0,y0,cell,ghost=false){let img=charImg.complete?charImg:altImg;if(!img.complete)return;let w=shape[0].length*cell,h=shape.length*cell;box(c,shape,x0,y0,cell,ghost,false);c.save();if(ghost)c.globalAlpha=.25;c.beginPath();rectPath(c,shape,x0,y0,cell);c.clip();cover(c,img,0,0,img.naturalWidth,img.naturalHeight,x0+1,y0+1,w-2,h-2);c.restore();border(c,shape,x0,y0,cell,ghost,false)}function drawBonus(c,p,x0,y0,cell,ghost=false){let img=bonusImg;if(!img.complete)return;let shape=p.shape,part=p.bonusPart,w=shape[0].length*cell,h=shape.length*cell;box(c,shape,x0,y0,cell,ghost,true);c.save();if(ghost)c.globalAlpha=.28;c.beginPath();rectPath(c,shape,x0,y0,cell);c.clip();let seg=img.naturalWidth/2;cover(c,img,seg*part,0,seg,img.naturalHeight,x0+1,y0+1,w-2,h-2);c.restore();corner(c,shape,x0,y0,cell);border(c,shape,x0,y0,cell,ghost,true)}function corner(c,shape,x0,y0,cell){c.save();c.strokeStyle='rgba(255,255,255,.96)';c.lineWidth=1.5;for(let y=0;y<shape.length;y++)for(let x=0;x<shape[y].length;x++)if(shape[y][x])c.strokeRect(x0+x*cell+5,y0+y*cell+5,cell-10,cell-10);c.restore()}function border(c,shape,x0,y0,cell,ghost=false,isBonus=false){c.save();c.strokeStyle=isBonus?'#ffca18':(ghost?'rgba(0,0,0,.3)':'#000');c.lineWidth=isBonus?3.4:2.5;c.shadowColor=isBonus?'#fff05a':'transparent';c.shadowBlur=isBonus?9:0;for(let y=0;y<shape.length;y++)for(let x=0;x<shape[y].length;x++)if(shape[y][x])c.strokeRect(x0+x*cell+.8,y0+y*cell+.8,cell-1.6,cell-1.6);c.restore()}function drawCell(x,y,d){let shape=[[1]],img=d.isBonus?bonusImg:(charImg.complete?charImg:altImg);box(ctx,shape,x*CELL,y*CELL,CELL,false,d.isBonus);ctx.save();ctx.beginPath();ctx.rect(x*CELL,y*CELL,CELL,CELL);ctx.clip();if(img.complete){if(d.isBonus){let seg=img.naturalWidth/2;cover(ctx,img,seg*d.bonusPart,0,seg,img.naturalHeight,(x-d.lx)*CELL+1,(y-d.ly)*CELL+1,d.w*CELL-2,d.h*CELL-2)}else cover(ctx,img,0,0,img.naturalWidth,img.naturalHeight,(x-d.lx)*CELL,(y-d.ly)*CELL,d.w*CELL,d.h*CELL)}ctx.restore();border(ctx,shape,x*CELL,y*CELL,CELL,false,d.isBonus);if(d.isBonus)corner(ctx,shape,x*CELL,y*CELL,CELL)}function drawPiece(p,ghost=false){if(p.isBonus)drawBonus(ctx,p,p.x*CELL,p.y*CELL,CELL,ghost);else drawNormal(ctx,p.shape,p.x*CELL,p.y*CELL,CELL,ghost)}function drawParticles(){ctx.save();for(const p of particles){ctx.globalAlpha=p.life/54;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();p.x+=p.vx;p.y+=p.vy;p.vy+=.08;p.life--}ctx.restore();particles=particles.filter(p=>p.life>0)}function drawClearFx(){ctx.save();clearRowsFx=clearRowsFx.filter(r=>r.life-->0);for(const r of clearRowsFx){let a=r.life/70;ctx.globalAlpha=a;ctx.fillStyle='rgba(255,240,70,.55)';ctx.fillRect(0,r.y*CELL,300,CELL);ctx.strokeStyle='rgba(255,255,255,.95)';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(0,r.y*CELL+CELL/2);ctx.lineTo(300,r.y*CELL+CELL/2);ctx.stroke()}ctx.restore()}function drawShock(){if(shock<=0)return;ctx.save();ctx.globalAlpha=shock*.28;ctx.fillStyle='#fff';ctx.fillRect(0,0,300,600);ctx.globalAlpha=shock;ctx.strokeStyle='#ffdd22';ctx.lineWidth=6;ctx.strokeRect(6,6,288,588);ctx.restore();shock*=.90}function draw(){drawGrid();for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++)if(board[y][x])drawCell(x,y,board[y][x]);if(piece&&!bonusActive){let g={...piece,shape:piece.shape};while(!collide(g,0,1))g.y++;drawPiece(g,true);drawPiece(piece,false)}drawClearFx();drawParticles();drawShock()}function drawMini(c,p){c.clearRect(0,0,148,112);let g=c.createLinearGradient(0,0,0,112);g.addColorStop(0,'#8cecff');g.addColorStop(1,'#116b93');c.fillStyle=g;c.fillRect(0,0,148,112);if(!p)return;let w=p.shape[0].length,h=p.shape.length,size=Math.min(30,110/Math.max(w,h)),ox=(148-w*size)/2,oy=(112-h*size)/2;if(p.isBonus)drawBonus(c,p,ox,oy,size,false);else drawNormal(c,p.shape,ox,oy,size,false)}
function flash(color){canvas.animate([{filter:'brightness(1.7) drop-shadow(0 0 18px '+color+')'},{filter:'brightness(1)'}],{duration:420})}function megaBurst(cells){let colors=['#ff4d00','#ffd400','#fff','#66e8ff','#ff8ad8','#fffb8a'];for(const [x,y]of cells)for(let i=0;i<58;i++)particles.push({x:(x+.5)*CELL,y:(y+.5)*CELL,vx:(Math.random()-.5)*10,vy:(Math.random()-.7)*10,r:2+Math.random()*5,life:38+Math.random()*34,color:colors[Math.random()*colors.length|0]})}function showCutin(b){cutinScore.textContent='BONUS +'+b+' / 10段消去';cutin.classList.remove('show');void cutin.offsetWidth;cutin.classList.add('show');setTimeout(()=>cutin.classList.remove('show'),1500)}function reset(start=true){board=empty();score=0;lines=0;level=1;dropMs=850;paused=false;over=false;bonusActive=false;holdPiece=null;canHold=true;particles=[];clearRowsFx=[];shock=0;nextPiece=randPiece();spawn();updateUI();drawMini(holdCtx,null);start?hideMsg():showStart();started=!!start;draw()}function gameOver(){over=true;started=false;msgTitle.textContent='ゲームオーバー';msgBody.innerHTML='SCORE：<b>'+score+'</b><br>R またはボタンでもう一回';startBtn.textContent='もう一回';msg.classList.add('show')}function showStart(){msgTitle.textContent='しまテト';msgBody.textContent='スマホ操作対応版。タップで回転、スワイプで移動できます。';startBtn.textContent='ゲームスタート';msg.classList.add('show')}function showPause(){msgTitle.textContent='一時停止';msgBody.textContent='Pで再開';startBtn.textContent='再開';msg.classList.add('show')}function hideMsg(){msg.classList.remove('show')}function loop(t=0){let dt=t-last;last=t;if(started&&!paused&&!over&&!bonusActive){acc+=dt;if(acc>dropMs){softDrop();acc=0}}draw();requestAnimationFrame(loop)}
document.addEventListener('keydown',e=>{if(e.code==='Enter'&&!started)reset(true);if(e.code==='ArrowLeft')move(-1);else if(e.code==='ArrowRight')move(1);else if(e.code==='ArrowDown')softDrop();else if(e.code==='ArrowUp'||e.code==='KeyX')turn(1);else if(e.code==='KeyZ')turn(-1);else if(e.code==='Space'){e.preventDefault();hardDrop()}else if(e.code==='KeyC')hold();else if(e.code==='KeyP'&&started&&!over&&!bonusActive){paused=!paused;paused?showPause():hideMsg()}else if(e.code==='KeyR')reset(true);draw()});
function bind(id,fn){let el=document.getElementById(id);el.addEventListener('pointerdown',e=>{e.preventDefault();fn();});}
bind('btnLeft',()=>move(-1));bind('btnRight',()=>move(1));bind('btnRot',()=>turn(1));bind('btnDrop',()=>hardDrop());bind('btnHold',()=>hold());
let sx=0,sy=0,st=0;canvas.addEventListener('pointerdown',e=>{sx=e.clientX;sy=e.clientY;st=Date.now();canvas.setPointerCapture?.(e.pointerId);});canvas.addEventListener('pointerup',e=>{let dx=e.clientX-sx,dy=e.clientY-sy,adx=Math.abs(dx),ady=Math.abs(dy);if(Math.max(adx,ady)<18&&Date.now()-st<320){turn(1);return}if(ady>adx&&dy>35)hardDrop();else if(adx>25)move(dx>0?1:-1);});
startBtn.onclick=()=>{if(paused){paused=false;hideMsg()}else reset(true)};document.getElementById('fsBtn').onclick=()=>{let el=document.documentElement;if(!document.fullscreenElement){el.requestFullscreen?.();screen.orientation?.lock?.('portrait').catch(()=>{});}else document.exitFullscreen?.();};document.getElementById('soundBtn').onclick=e=>{soundOn=!soundOn;e.target.textContent=soundOn?'音OFF':'音ON';beep('bubble')};document.getElementById('vibeBtn').onclick=e=>{vibeOn=!vibeOn;e.target.textContent=vibeOn?'振動OFF':'振動ON';vibrate(40)};
Promise.all([charImg.decode().catch(()=>{}),altImg.decode().catch(()=>{}),bonusImg.decode().catch(()=>{})]).then(()=>{board=empty();nextPiece=randPiece();piece=nextPiece;nextPiece=randPiece();drawMini(nextCtx,nextPiece);drawMini(holdCtx,null);draw();requestAnimationFrame(loop)});
</script></body></html>
